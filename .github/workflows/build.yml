name: Build NSC ModManager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build XFBIN_LIB
      run: dotnet build XFBIN_LIB/XFBIN_LIB.csproj --configuration Release

    - name: Build NSC-ModManager
      run: dotnet build NSC-ModManager.csproj --configuration Release --no-restore /p:GenerateAssemblyInfo=false /p:GenerateTargetFrameworkAttribute=false

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NSC-ModManager
        path: bin/Release/
